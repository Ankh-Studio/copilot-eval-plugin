name: Validation

on:
  workflow_call:
    inputs:
      summary-title:
        description: 'Title for the summary'
        required: false
        default: 'Validation Summary'
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate package.json
        run: |
          npm pkg fix
          npm pack --dry-run

      - name: Validate plugin.json
        run: |
          node -e "
            const plugin = require('./plugin.json');
            const required = ['name', 'description', 'version', 'author', 'license', 'skills'];
            required.forEach(field => {
              if (!plugin[field]) {
                console.error(\`Missing required field: \${field}\`);
                process.exit(1);
              }
            });
            console.log('✅ plugin.json validation passed');
          "

      - name: Check version sync
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./plugin.json').version")
          
          if [ "$PACKAGE_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "❌ Version mismatch:"
            echo "  package.json: $PACKAGE_VERSION"
            echo "  plugin.json: $PLUGIN_VERSION"
            exit 1
          else
            echo "✅ Versions are in sync: $PACKAGE_VERSION"
          fi

      - name: Validate skills exist
        run: |
          node -e "
            const plugin = require('./plugin.json');
            const fs = require('fs');
            
            plugin.skills.forEach(skill => {
              if (!fs.existsSync(skill)) {
                console.error(\`Missing skill directory: \${skill}\`);
                process.exit(1);
              }
              const skillFile = skill + 'SKILL.md';
              if (!fs.existsSync(skillFile)) {
                console.error(\`Missing skill file: \${skillFile}\`);
                process.exit(1);
              }
            });
            console.log(\`✅ All \${plugin.skills.length} skills validated\`);
          "

      - name: Check file structure
        run: |
          echo "📁 Validating file structure..."
          
          # Check required files
          required_files=(
            "package.json"
            "plugin.json"
            "README.md"
            "LICENSE"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ Missing $file"
              exit 1
            fi
          done
          
          # Check required directories
          required_dirs=(
            "skills"
            "rubrics"
            "agents"
          )
          
          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ $dir/"
            else
              echo "❌ Missing $dir/"
              exit 1
            fi
          done

      - name: Validate package files
        run: |
          echo "📦 Checking package.json files field..."
          
          # Get files from package.json
          files=$(node -p "require('./package.json').files.join(' ')")
          
          # Check each file/directory exists
          for file in $files; do
            if [ -e "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ Missing $file"
              exit 1
            fi
          done

      - name: Test npm pack
        run: |
          echo "📦 Testing npm pack..."
          PACK_FILE=$(npm pack | tail -n 1)
          echo "Created: $PACK_FILE"
          
          # Extract and check contents
          tar -tzf "$PACK_FILE" | head -20
          
          # Cleanup
          rm "$PACK_FILE"
          echo "✅ npm pack test passed"

      - name: Validation Summary
        run: |
          echo "## ${{ inputs.summary-title }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package Validation**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Plugin Validation**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Sync**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Skills Validation**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **File Structure**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Package Test**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
