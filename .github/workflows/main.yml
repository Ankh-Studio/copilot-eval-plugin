---
name: Release Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # PR: Only run formatting checks
  format-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run format check
        run: npm run format:check

      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo, number } = context.issue;

            const comment = `
            ## ✅ PR Formatting Check

            **Status**: Code formatting validation passed
            **Next Steps**: Approve and merge to trigger automated release

            ---
            *This comment was automatically generated by the release pipeline*
            `;

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: comment
            });

  # Main: Complete automated release pipeline
  automated-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run quality checks
        run: |
          npm run format:check
          chmod +x scripts/validate-release.js
          node scripts/validate-release.js

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Semantic Version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "/!:|BREAKING CHANGE:/"
          minor_pattern: "/feat(\\(.+\\))?:/"
          version_format: "${major}.${minor}.${patch}"

      - name: Update version in files
        if: steps.version.outputs.version_changed == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"

          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version

          # Update plugin.json
          sed -i '' 's/"version": "[^"]*"/"version": "'$NEW_VERSION'"/' plugin.json

          # Update marketplace.json
          if [ -f .github/plugin/marketplace.json ]; then
            sed -i '' 's/"version": "[^"]*"/"version": "'$NEW_VERSION'"/g' .github/plugin/marketplace.json
          fi

          # Update README.md version references
          sed -i '' 's/v[0-9]\+\.[0-9]\+\.[0-9]\+/v'$NEW_VERSION'/g' README.md

      - name: Commit version changes
        if: steps.version.outputs.version_changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json plugin.json .github/plugin/marketplace.json README.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create Git Tag
        if: steps.version.outputs.version_changed == 'true'
        run: |
          git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
          git push --tags

      - name: Prepare Marketplace Package
        if: steps.version.outputs.version_changed == 'true'
        run: |
          mkdir -p marketplace-package

          # Copy essential files
          cp package.json plugin.json README.md CHANGELOG.md INSTALL.md marketplace-package/ 2>/dev/null || true

          # Copy directories
          cp -r skills agents rubrics marketplace-package/ 2>/dev/null || true

          # Copy marketplace config
          if [ -d .github/plugin ]; then
            mkdir -p marketplace-package/.github/plugin
            cp -r .github/plugin/* marketplace-package/.github/plugin/
          fi

          # Create archive
          tar -czf copilot-enterprise-eval-plugin-v${{ steps.version.outputs.version }}.tar.gz -C marketplace-package .

      - name: Create GitHub Release
        if: steps.version.outputs.version_changed == 'true'
        uses: ghalactic/github-release-from-tag@v6

      - name: Notify Success
        if: steps.version.outputs.version_changed == 'true'
        run: |
          echo "✅ Release pipeline complete!"
          echo "📦 Version: ${{ steps.version.outputs.version }}"
          echo "🔗 Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
          echo "� Package: copilot-enterprise-eval-plugin-v${{ steps.version.outputs.version }}.tar.gz"
          echo "ℹ️ Marketplace publishing: Manual upload when GitHub provides API"

      - name: Notify No Changes
        if: steps.version.outputs.version_changed == 'false'
        run: |
          echo "ℹ️ No version changes detected - no release created"
